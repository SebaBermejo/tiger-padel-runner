<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Kiro Padel Runner</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: manipulation;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    body {
      background: #0d0d1a;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    #game-wrapper {
      position: relative;
      width: 100vw;
      height: 100vh;
      max-width: 900px;
      max-height: 500px;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 0;
    }

    #ui-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    #score-display {
      position: absolute;
      top: 12px;
      right: 18px;
      color: #b8e0ff;
      font-size: min(5vw, 22px);
      font-weight: 700;
      letter-spacing: 1px;
      text-shadow: 0 0 10px rgba(100, 200, 255, 0.5);
    }

    #hi-score-display {
      position: absolute;
      top: 12px;
      left: 18px;
      color: #7a9bb5;
      font-size: min(4vw, 16px);
      font-weight: 600;
    }

    .screen-message {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      pointer-events: none;
      padding: 20px;
      text-align: center;
    }

    .screen-message h1 {
      color: #e0f0ff;
      font-size: min(8vw, 36px);
      text-shadow: 0 0 20px rgba(100, 200, 255, 0.6);
    }

    .screen-message p {
      color: #8ab8d8;
      font-size: min(5vw, 18px);
    }

    .screen-message .final-score {
      color: #ffcc66;
      font-size: min(7vw, 28px);
      font-weight: 700;
      text-shadow: 0 0 12px rgba(255, 200, 80, 0.5);
    }

    .blink {
      animation: blink 1s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    @keyframes bluelabel {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
      20% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
      80% { opacity: 1; transform: translate(-50%, -60%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -80%) scale(0.8); }
    }
  </style>
</head>
<body>
  <div id="game-wrapper">
    <canvas id="game"></canvas>
    <div id="ui-overlay">
      <div id="score-display">0</div>
      <div id="hi-score-display">HI 0</div>
      <div id="lives-display" style="position:absolute;top:12px;left:50%;transform:translateX(-50%);color:#ff6666;font-size:min(5vw,20px);font-weight:700;text-shadow:0 0 8px rgba(255,100,100,0.5);">❤️ ❤️</div>

      <div id="start-screen" class="screen-message" style="display: flex;">
        <h1>🏓 TIGER Padel Runner</h1>
        <p style="color:#8ab8d8;font-size:min(4.5vw,16px);margin-top:8px;">Escriba <span style="color:#ffcc66;font-weight:bold;">Gatero</span> aquí para iniciar</p>
        <input id="gatero-input" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="Escribí Gatero..." style="margin-top:12px;padding:10px 16px;font-size:min(5vw,18px);border:2px solid #ffcc66;border-radius:8px;background:rgba(0,0,0,0.5);color:#fff;text-align:center;outline:none;width:200px;pointer-events:auto;" />
        <p id="gatero-error" style="color:#ff6666;font-size:min(3.5vw,14px);margin-top:6px;display:none;">¡Escribí "Gatero" para jugar!</p>
      </div>

      <div id="gameover-screen" class="screen-message">
        <h1>💀 Game Over</h1>
        <p style="color: #ff6b6b; font-size: min(4.5vw, 17px); margin-top: 4px;">Perdiste como Todos los Jueves... manco</p>
        <p class="final-score" id="final-score">0</p>
        <p class="blink">Toca para reintentar</p>
      </div>
    </div>
  </div>

    // Load player image
    const playerImg = new Image();
    playerImg.src = PLAYER_IMG_SRC;
    let playerImgReady = false;
    playerImg.onload = () => { playerImgReady = true; };

    // --- Canvas setup ---
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    // Internal resolution
    const W = 800;
    const H = 400;
    canvas.width = W;
    canvas.height = H;

    const scoreDisplay = document.getElementById('score-display');
    const hiScoreDisplay = document.getElementById('hi-score-display');
    const startScreen = document.getElementById('start-screen');
    const gameoverScreen = document.getElementById('gameover-screen');
    const finalScoreEl = document.getElementById('final-score');

    // Game state
    const State = { IDLE: 0, PLAYING: 1, DEAD: 2 };
    let state = State.IDLE;
    let score = 0;
    let hiScore = parseInt(localStorage.getItem('kiro-hi') || '0', 10);
    let gameSpeed = 4;
    let frameCount = 0;
    let lives = 2;

    hiScoreDisplay.textContent = 'HI ' + hiScore;

    // Ground
    const GROUND_Y = H - 60;

    // Player
    const player = {
      x: 100,
      y: GROUND_Y,
      w: 80,
      h: 120,
      vy: 0,
      grounded: true,
      jumpPower: -13,
      gravity: 0.55,
    };

    // Obstacles
    let obstacles = [];
    let spawnTimer = 0;
    const MIN_SPAWN = 60;
    const MAX_SPAWN = 130;

    // Particles
    let particles = [];

    // Stars (background)
    const stars = Array.from({ length: 80 }, () => ({
      x: Math.random() * W,
      y: Math.random() * (GROUND_Y - 40),
      r: Math.random() * 1.5 + 0.5,
      speed: Math.random() * 0.3 + 0.1,
      twinkle: Math.random() * Math.PI * 2,
    }));

    // Ground tiles
    const groundTiles = Array.from({ length: Math.ceil(W / 20) + 2 }, (_, i) => ({
      x: i * 20,
      h: Math.random() * 4 + 2,
    }));
    let groundOffset = 0;

    // --- roundRect polyfill for older mobile browsers ---
    if (!CanvasRenderingContext2D.prototype.roundRect) {
      CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, radii) {
        var r = typeof radii === 'number' ? radii : (Array.isArray(radii) ? radii[0] : 0);
        if (r > w / 2) r = w / 2;
        if (r > h / 2) r = h / 2;
        this.moveTo(x + r, y);
        this.lineTo(x + w - r, y);
        this.quadraticCurveTo(x + w, y, x + w, y + r);
        this.lineTo(x + w, y + h - r);
        this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        this.lineTo(x + r, y + h);
        this.quadraticCurveTo(x, y + h, x, y + h - r);
        this.lineTo(x, y + r);
        this.quadraticCurveTo(x, y, x + r, y);
        this.closePath();
        return this;
      };
    }

    // --- Sound effects (Mario-style using Web Audio API) ---
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;

    function getAudioCtx() {
      if (!audioCtx) audioCtx = new AudioCtx();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }

    function playJumpSound() {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'square';
      osc.frequency.setValueAtTime(500, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.15);
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.2);
    }

    function playCoinSound() {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'square';
      osc.frequency.setValueAtTime(988, ctx.currentTime);
      osc.frequency.setValueAtTime(1319, ctx.currentTime + 0.07);
      gain.gain.setValueAtTime(0.2, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.15);
    }

    function playDeathSound() {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'square';
      osc.frequency.setValueAtTime(600, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(200, ctx.currentTime + 0.15);
      osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.4);
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.5);
    }

    // --- Drawing helpers ---

    function drawPlayer(p) {
      const bobY = Math.sin(frameCount * 0.08) * 3;
      const runCycle = Math.sin(frameCount * 0.15) * 0.4; // leg/arm animation

      // Character proportions - big head, small body
      const headRadius = p.w / 2;
      const bodyH = p.h * 0.3;
      const bodyW = p.w * 0.45;
      const legLen = p.h * 0.22;
      const armLen = p.h * 0.25;

      // Positions
      const headCenterX = p.x;
      const headCenterY = p.y - legLen - bodyH - headRadius + bobY;
      const bodyTop = p.y - legLen - bodyH + bobY;
      const bodyBottom = p.y - legLen + bobY;
      const hipY = bodyBottom;

      // Shadow on ground
      ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, 20, 5, 0, 0, Math.PI * 2);
      ctx.fill();

      // Legs
      ctx.strokeStyle = '#ffcc66';
      ctx.lineWidth = 5;
      ctx.lineCap = 'round';
      // Left leg
      ctx.beginPath();
      ctx.moveTo(p.x - 8, hipY);
      ctx.lineTo(p.x - 8 - Math.sin(runCycle) * 8, p.y - 2);
      ctx.stroke();
      // Right leg
      ctx.beginPath();
      ctx.moveTo(p.x + 8, hipY);
      ctx.lineTo(p.x + 8 + Math.sin(runCycle) * 8, p.y - 2);
      ctx.stroke();

      // Shoes
      ctx.fillStyle = '#cc3333';
      ctx.beginPath();
      ctx.ellipse(p.x - 8 - Math.sin(runCycle) * 8, p.y - 1, 6, 4, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(p.x + 8 + Math.sin(runCycle) * 8, p.y - 1, 6, 4, 0, 0, Math.PI * 2);
      ctx.fill();

      // Body (small oval)
      const bodyGrad = ctx.createLinearGradient(p.x, bodyTop, p.x, bodyBottom);
      bodyGrad.addColorStop(0, '#4488ff');
      bodyGrad.addColorStop(1, '#2266cc');
      ctx.fillStyle = bodyGrad;
      ctx.beginPath();
      ctx.ellipse(p.x, bodyTop + bodyH / 2, bodyW / 2, bodyH / 2, 0, 0, Math.PI * 2);
      ctx.fill();

      // Arms
      ctx.strokeStyle = '#ffcc66';
      ctx.lineWidth = 5;
      // Left arm
      ctx.beginPath();
      ctx.moveTo(p.x - bodyW / 2, bodyTop + bodyH * 0.3);
      ctx.lineTo(p.x - bodyW / 2 - armLen * 0.7, bodyTop + bodyH * 0.5 + Math.sin(runCycle) * 10);
      ctx.stroke();
      // Right arm
      ctx.beginPath();
      ctx.moveTo(p.x + bodyW / 2, bodyTop + bodyH * 0.3);
      ctx.lineTo(p.x + bodyW / 2 + armLen * 0.7, bodyTop + bodyH * 0.5 - Math.sin(runCycle) * 10);
      ctx.stroke();

      // Hands (small circles)
      ctx.fillStyle = '#ffcc66';
      ctx.beginPath();
      ctx.arc(p.x - bodyW / 2 - armLen * 0.7, bodyTop + bodyH * 0.5 + Math.sin(runCycle) * 10, 4, 0, Math.PI * 2);
      ctx.fill();

      // Right hand with padel racket
      const handX = p.x + bodyW / 2 + armLen * 0.7;
      const handY = bodyTop + bodyH * 0.5 - Math.sin(runCycle) * 10;

      // Draw padel racket (Bullpadel style - black and yellow/green)
      ctx.save();
      ctx.translate(handX, handY);
      ctx.rotate(-0.3 + Math.sin(runCycle) * 0.1); // slight tilt with movement

      // Handle
      const handleW = 4;
      const handleH = 16;
      const handleGrad = ctx.createLinearGradient(-handleW/2, 0, handleW/2, 0);
      handleGrad.addColorStop(0, '#1a1a1a');
      handleGrad.addColorStop(0.5, '#333');
      handleGrad.addColorStop(1, '#1a1a1a');
      ctx.fillStyle = handleGrad;
      ctx.beginPath();
      ctx.roundRect(-handleW/2, 0, handleW, handleH, 2);
      ctx.fill();

      // Grip wrap
      ctx.strokeStyle = 'rgba(200, 200, 0, 0.4)';
      ctx.lineWidth = 0.8;
      for (var gi = 0; gi < 4; gi++) {
        ctx.beginPath();
        ctx.moveTo(-handleW/2, 2 + gi * 3.5);
        ctx.lineTo(handleW/2, 4 + gi * 3.5);
        ctx.stroke();
      }

      // Racket head
      const rHeadW = 22;
      const rHeadH = 28;
      const rHeadY = -rHeadH + 2;

      // Head background - black
      const headGrad = ctx.createLinearGradient(0, rHeadY, 0, rHeadY + rHeadH);
      headGrad.addColorStop(0, '#1a1a1a');
      headGrad.addColorStop(0.4, '#222');
      headGrad.addColorStop(1, '#111');
      ctx.fillStyle = headGrad;
      ctx.beginPath();
      ctx.roundRect(-rHeadW/2, rHeadY, rHeadW, rHeadH, rHeadW/3);
      ctx.fill();

      // Yellow/green accent stripe (Bullpadel style)
      ctx.fillStyle = '#c8e600';
      ctx.beginPath();
      ctx.roundRect(-rHeadW/2 + 2, rHeadY + rHeadH * 0.15, rHeadW - 4, 5, 2);
      ctx.fill();

      // Frame border
      ctx.strokeStyle = '#c8e600';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.roundRect(-rHeadW/2, rHeadY, rHeadW, rHeadH, rHeadW/3);
      ctx.stroke();

      // Holes (padel characteristic)
      ctx.fillStyle = 'rgba(200, 230, 0, 0.15)';
      for (var row = 0; row < 3; row++) {
        for (var col = 0; col < 2; col++) {
          var hx = -5 + col * 10;
          var hy = rHeadY + 12 + row * 7;
          ctx.beginPath();
          ctx.arc(hx, hy, 2, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      // "BullPadel" text
      ctx.fillStyle = '#c8e600';
      ctx.font = 'bold 4.5px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('BULL', 0, rHeadY + 6);
      ctx.fillText('PADEL', 0, rHeadY + 11);

      ctx.restore();

      // Right hand (on top of handle)
      ctx.fillStyle = '#ffcc66';
      ctx.beginPath();
      ctx.arc(handX, handY, 4, 0, Math.PI * 2);
      ctx.fill();

      // Head (big circle with photo)
      if (playerImgReady) {
        ctx.save();

        // Glow behind head
        const glowGrad = ctx.createRadialGradient(headCenterX, headCenterY, headRadius * 0.5, headCenterX, headCenterY, headRadius * 1.3);
        glowGrad.addColorStop(0, 'rgba(100, 200, 255, 0.15)');
        glowGrad.addColorStop(1, 'rgba(100, 200, 255, 0)');
        ctx.fillStyle = glowGrad;
        ctx.beginPath();
        ctx.arc(headCenterX, headCenterY, headRadius * 1.3, 0, Math.PI * 2);
        ctx.fill();

        // Clip circle for face
        ctx.beginPath();
        ctx.arc(headCenterX, headCenterY, headRadius, 0, Math.PI * 2);
        ctx.closePath();
        ctx.clip();

        // Draw face image
        ctx.drawImage(playerImg, headCenterX - headRadius, headCenterY - headRadius, headRadius * 2, headRadius * 2);

        ctx.restore();

        // Head border
        ctx.strokeStyle = 'rgba(180, 220, 255, 0.8)';
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.arc(headCenterX, headCenterY, headRadius, 0, Math.PI * 2);
        ctx.stroke();
      } else {
        // Fallback head
        ctx.fillStyle = '#66ccff';
        ctx.beginPath();
        ctx.arc(headCenterX, headCenterY, headRadius, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = '28px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('😎', headCenterX, headCenterY);
      }
    }

    function drawObstacle(ob) {
      if (ob.type === 'ball') {
        // Tennis ball
        const r = ob.w / 2;
        const cx = ob.x;
        const cy = GROUND_Y - r;

        // Spin animation
        ob.spin += 0.08;

        // Ball shadow
        ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
        ctx.beginPath();
        ctx.ellipse(cx + 3, GROUND_Y - 1, r * 0.8, 3, 0, 0, Math.PI * 2);
        ctx.fill();

        // Main ball - tennis yellow-green
        const ballGrad = ctx.createRadialGradient(cx - 3, cy - 3, 2, cx, cy, r);
        ballGrad.addColorStop(0, '#d4e84f');
        ballGrad.addColorStop(0.7, '#c6d932');
        ballGrad.addColorStop(1, '#9aad20');
        ctx.fillStyle = ballGrad;
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fill();

        // Tennis ball seam (curved line)
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(ob.spin);
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.7)';
        ctx.lineWidth = 1.8;
        // Left seam curve
        ctx.beginPath();
        ctx.arc(-r * 0.15, 0, r * 0.75, -1.2, 1.2, false);
        ctx.stroke();
        // Right seam curve
        ctx.beginPath();
        ctx.arc(r * 0.15, 0, r * 0.75, Math.PI - 1.2, Math.PI + 1.2, false);
        ctx.stroke();
        ctx.restore();

        // Glow
        ctx.shadowColor = '#c6d932';
        ctx.shadowBlur = 8;
        ctx.strokeStyle = 'rgba(200, 220, 50, 0.3)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.stroke();
        ctx.shadowBlur = 0;

      } else {
        // Padel racket standing upright
        const cx = ob.x;
        const baseY = GROUND_Y;
        const totalH = ob.h;
        const handleH = totalH * 0.4;
        const headH = totalH * 0.6;
        const headW = ob.w;
        const handleW = 7;

        // Handle
        const handleGrad = ctx.createLinearGradient(cx - handleW / 2, baseY, cx + handleW / 2, baseY);
        handleGrad.addColorStop(0, '#2a2a2a');
        handleGrad.addColorStop(0.5, '#444');
        handleGrad.addColorStop(1, '#2a2a2a');
        ctx.fillStyle = handleGrad;
        ctx.beginPath();
        ctx.roundRect(cx - handleW / 2, baseY - handleH, handleW, handleH, 2);
        ctx.fill();

        // Grip wrap lines
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
        ctx.lineWidth = 1;
        for (let i = 0; i < 5; i++) {
          const gy = baseY - 4 - i * (handleH / 6);
          ctx.beginPath();
          ctx.moveTo(cx - handleW / 2, gy);
          ctx.lineTo(cx + handleW / 2, gy - 3);
          ctx.stroke();
        }

        // Racket head (rounded rectangle)
        const headTop = baseY - handleH - headH;
        const headGrad = ctx.createLinearGradient(cx, headTop, cx, headTop + headH);
        headGrad.addColorStop(0, '#1a8cff');
        headGrad.addColorStop(0.5, '#0066cc');
        headGrad.addColorStop(1, '#004499');
        ctx.fillStyle = headGrad;
        ctx.beginPath();
        ctx.roundRect(cx - headW / 2, headTop, headW, headH, headW / 3);
        ctx.fill();

        // Racket frame border
        ctx.strokeStyle = '#0055aa';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.roundRect(cx - headW / 2, headTop, headW, headH, headW / 3);
        ctx.stroke();

        // Holes pattern (padel racket characteristic)
        ctx.fillStyle = 'rgba(0, 30, 80, 0.6)';
        const holesRows = 3;
        const holesCols = 2;
        const holeR = 2.5;
        const padX = headW / (holesCols + 1);
        const padY = headH / (holesRows + 1);
        for (let row = 1; row <= holesRows; row++) {
          for (let col = 1; col <= holesCols; col++) {
            const hx = cx - headW / 2 + col * padX;
            const hy = headTop + row * padY;
            ctx.beginPath();
            ctx.arc(hx, hy, holeR, 0, Math.PI * 2);
            ctx.fill();
          }
        }

        // Subtle glow
        ctx.shadowColor = '#1a8cff';
        ctx.shadowBlur = 6;
        ctx.strokeStyle = 'rgba(26, 140, 255, 0.2)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.roundRect(cx - headW / 2, headTop, headW, headH, headW / 3);
        ctx.stroke();
        ctx.shadowBlur = 0;
      }
    }

    function drawGround() {
      ctx.fillStyle = '#1a2a3a';
      ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);

      const edgeGrad = ctx.createLinearGradient(0, GROUND_Y - 2, 0, GROUND_Y + 6);
      edgeGrad.addColorStop(0, 'rgba(100, 180, 255, 0.3)');
      edgeGrad.addColorStop(1, 'rgba(100, 180, 255, 0)');
      ctx.fillStyle = edgeGrad;
      ctx.fillRect(0, GROUND_Y - 2, W, 8);

      ctx.fillStyle = '#253545';
      for (const tile of groundTiles) {
        const drawX = ((tile.x - groundOffset) % (W + 40)) - 20;
        ctx.fillRect(drawX, GROUND_Y, 18, tile.h);
      }
    }

    function drawStars() {
      for (const s of stars) {
        s.twinkle += 0.02;
        const alpha = 0.4 + Math.sin(s.twinkle) * 0.3;
        ctx.fillStyle = 'rgba(200, 230, 255, ' + alpha + ')';
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function spawnParticles(x, y, count, color) {
      for (let i = 0; i < count; i++) {
        particles.push({
          x, y,
          vx: (Math.random() - 0.5) * 4,
          vy: (Math.random() - 1) * 4,
          life: 1,
          decay: Math.random() * 0.03 + 0.02,
          r: Math.random() * 3 + 1,
          color,
        });
      }
    }

    function updateParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.1;
        p.life -= p.decay;
        if (p.life <= 0) particles.splice(i, 1);
      }
    }

    function drawParticles() {
      for (const p of particles) {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    // --- Trail ---
    let trail = [];

    function updateTrail() {
      const bobY = Math.sin(frameCount * 0.08) * 3;
      trail.push({ x: player.x, y: player.y - player.h / 2 + bobY, alpha: 0.5 });
      if (trail.length > 10) trail.shift();
      for (const t of trail) t.alpha -= 0.05;
    }

    function drawTrail() {
      for (const t of trail) {
        if (t.alpha <= 0) continue;
        ctx.globalAlpha = t.alpha * 0.25;
        ctx.fillStyle = '#88ccff';
        ctx.beginPath();
        ctx.arc(t.x, t.y, player.w / 2 - 2, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    // --- Game logic ---

    function reset() {
      player.y = GROUND_Y;
      player.vy = 0;
      player.grounded = true;
      obstacles = [];
      particles = [];
      trail = [];
      score = 0;
      gameSpeed = 4;
      spawnTimer = 80;
      frameCount = 0;
      lives = 2;
      scoreDisplay.textContent = '0';
      document.getElementById('lives-display').textContent = '❤️ ❤️';
    }

    function spawnObstacle() {
      const type = Math.random() < 0.5 ? 'ball' : 'racket';
      const ob = {
        x: W + 30,
        type,
        w: type === 'ball' ? 28 : 30,
        h: type === 'ball' ? 28 : 55 + Math.random() * 10,
        scored: false,
        spin: 0,
      };
      obstacles.push(ob);
    }

    function update() {
      frameCount++;

      // Player physics
      if (!player.grounded) {
        player.vy += player.gravity;
        player.y += player.vy;
        if (player.y >= GROUND_Y) {
          player.y = GROUND_Y;
          player.vy = 0;
          player.grounded = true;
          spawnParticles(player.x, GROUND_Y, 5, '#88bbdd');
        }
      }

      // Speed ramp - accelerates as score increases
      gameSpeed = 4 + score * 0.08;
      if (gameSpeed > 14) gameSpeed = 14;

      // Ground scroll
      groundOffset += gameSpeed;

      // Stars scroll
      for (const s of stars) {
        s.x -= s.speed;
        if (s.x < -5) s.x = W + 5;
      }

      // Spawn obstacles
      spawnTimer--;
      if (spawnTimer <= 0) {
        spawnObstacle();
        spawnTimer = MIN_SPAWN + Math.random() * (MAX_SPAWN - MIN_SPAWN);
        spawnTimer = Math.max(40, spawnTimer - score * 0.1);
      }

      // Move obstacles
      for (let i = obstacles.length - 1; i >= 0; i--) {
        const ob = obstacles[i];
        ob.x -= gameSpeed;

        if (!ob.scored && ob.x + ob.w / 2 < player.x) {
          ob.scored = true;
          score++;
          playCoinSound();
          scoreDisplay.textContent = score;
        }

        if (ob.x < -50) {
          obstacles.splice(i, 1);
          continue;
        }

        // Collision (circular hitbox for player)
        const bobY = Math.sin(frameCount * 0.08) * 3;
        const pcx = player.x;
        const pcy = player.y - player.h / 2 + bobY;
        const pr = player.w / 2 - 6; // slightly smaller for forgiveness

        if (ob.type === 'ball') {
          // Circle vs circle for tennis ball
          const br = ob.w / 2;
          const bcx = ob.x;
          const bcy = GROUND_Y - br;
          const ddx = pcx - bcx;
          const ddy = pcy - bcy;
          const dist = Math.sqrt(ddx * ddx + ddy * ddy);
          if (dist < pr + br - 4) {
            die();
            return;
          }
        } else {
          // Circle vs AABB for racket
          const oLeft = ob.x - ob.w / 2 + 3;
          const oRight = ob.x + ob.w / 2 - 3;
          const oTop = GROUND_Y - ob.h + 3;
          const oBottom = GROUND_Y;

          const closestX = Math.max(oLeft, Math.min(pcx, oRight));
          const closestY = Math.max(oTop, Math.min(pcy, oBottom));
          const dx = pcx - closestX;
          const dy = pcy - closestY;

          if (dx * dx + dy * dy < pr * pr) {
            die();
            return;
          }
        }
      }

      updateTrail();
      updateParticles();

      if (frameCount % 4 === 0) {
        spawnParticles(player.x - 15, player.y - 5, 1, 'rgba(150, 210, 255, 0.6)');
      }
    }

    function die() {
      lives--;
      spawnParticles(player.x, player.y - player.h / 2, 20, '#c6d932');
      spawnParticles(player.x, player.y - player.h / 2, 15, '#1a8cff');

      // Update lives display
      var heartsText = '';
      for (var i = 0; i < lives; i++) heartsText += '❤️ ';
      document.getElementById('lives-display').textContent = heartsText.trim();

      if (lives <= 0) {
        // Really dead
        state = State.DEAD;
        playDeathSound();

        if (score > hiScore) {
          hiScore = score;
          localStorage.setItem('kiro-hi', hiScore.toString());
          hiScoreDisplay.textContent = 'HI ' + hiScore;
        }

        finalScoreEl.textContent = score;
        gameoverScreen.style.display = 'flex';
      } else {
        // Lost a life but keep going - brief invincibility
        playDeathSound();
        player.y = GROUND_Y;
        player.vy = 0;
        player.grounded = true;
        // Remove the obstacle that hit us
        obstacles.shift();
      }
    }

    function draw() {
      const bg = ctx.createLinearGradient(0, 0, 0, H);
      bg.addColorStop(0, '#0a0a1a');
      bg.addColorStop(1, '#141428');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, W, H);

      drawStars();
      drawGround();
      drawTrail();
      drawParticles();

      for (const ob of obstacles) drawObstacle(ob);

      drawPlayer(player);
    }

    // --- Main loop ---

    function loop() {
      if (state === State.PLAYING) {
        update();
      } else if (state === State.DEAD) {
        updateParticles();
      }
      draw();
      requestAnimationFrame(loop);
    }

    // --- Input ---

    function jump() {
      if (player.grounded) {
        player.vy = player.jumpPower;
        player.grounded = false;
        playJumpSound();
        spawnParticles(player.x, GROUND_Y, 6, '#aaddff');
      }
    }

    let lastInputTime = 0;

    let jumpCount = 0;

    function handleInput() {
      const now = Date.now();
      if (now - lastInputTime < 150) return; // debounce
      lastInputTime = now;
      if (state === State.IDLE) {
        // Check if "gatero" was typed
        const input = document.getElementById('gatero-input');
        if (input.value.toLowerCase().trim() !== 'gatero') {
          document.getElementById('gatero-error').style.display = 'block';
          input.value = '';
          input.focus();
          return;
        }
        state = State.PLAYING;
        startScreen.style.display = 'none';
        reset();
        jumpCount = 0;
      } else if (state === State.PLAYING) {
        jump();
        jumpCount++;
        if (jumpCount % 3 === 0) {
          showBlueLabel();
        }
      } else if (state === State.DEAD) {
        gameoverScreen.style.display = 'none';
        state = State.PLAYING;
        reset();
        jumpCount = 0;
      }
    }

    function showBlueLabel() {
      // Create floating "Blue Label" text
      var el = document.createElement('div');
      el.textContent = '🥃 Blue Label';
      el.style.cssText = 'position:absolute;top:30%;left:50%;transform:translate(-50%,-50%);color:#1a6bff;font-size:min(8vw,32px);font-weight:900;text-shadow:0 0 15px rgba(26,107,255,0.8),0 0 30px rgba(26,107,255,0.4);pointer-events:none;z-index:100;animation:bluelabel 1.2s ease-out forwards;font-style:italic;';
      document.getElementById('game-wrapper').appendChild(el);
      setTimeout(function() { el.remove(); }, 1300);
    }

    // Keyboard
    document.addEventListener('keydown', function(e) {
      if (e.code === 'Space') {
        e.preventDefault();
        handleInput();
      }
      // Enter key to start game from input
      if (e.code === 'Enter' && state === State.IDLE) {
        e.preventDefault();
        handleInput();
      }
    });

    // --- TOUCH / CLICK (iOS compatible) ---
    // On iOS Safari, 'click' fires reliably after a tap.
    // We use both touchstart AND click, with a flag to avoid double-fire.

    var inputHandled = false;

    function onPointerDown(e) {
      if (e.cancelable) e.preventDefault();
      if (inputHandled) return;
      inputHandled = true;
      handleInput();
      setTimeout(function() { inputHandled = false; }, 200);
    }

    // Use touchstart where supported
    document.body.addEventListener('touchstart', onPointerDown, { passive: false });

    // Click as fallback (also fires on iOS tap after ~300ms)
    document.body.addEventListener('click', onPointerDown);

    // Prevent iOS rubber-band scrolling and pinch zoom
    document.body.addEventListener('touchmove', function(e) {
      if (e.cancelable) e.preventDefault();
    }, { passive: false });

    // Start render loop
    loop();
  </script>
</body>
